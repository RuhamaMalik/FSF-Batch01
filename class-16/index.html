<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .box {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .box input,
    .box button {
      border: none;
      outline: none;
      background-color: azure;
      border-bottom: 1px solid blueviolet;
      width: 500px;
      padding: 5px;
    }

    .box button {
      background-color: blueviolet;
      color: white;
    }


     .box button:hover {
      background-color: black;
      cursor: pointer;
    }
  </style>

</head>

<body>


  <div class="box">
    <input id="number" type="number" placeholder="Enter a number. e.g 5">
    <input id="start" type="number" placeholder="Enter Start number. e.g 1">
    <input id="end" type="number" placeholder="Enter End number. e.g 10">
    <button onclick="printTable()" >Generate</button>
  </div>
  <script src="./index.js"></script>
</body>

</html>
